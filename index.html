<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberBox - 4星词汇矩阵拦截</title>
    <style>
        :root {
            --matrix-bg: #000500;
            --matrix-panel: rgba(0, 20, 0, 0.95);
            --matrix-green: #00FF41;
            --matrix-dark: #003B00;
            --miss-red: #ff3131;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--matrix-bg); font-family: 'Consolas', 'Segoe UI', 'Microsoft YaHei', sans-serif; overflow: hidden; color: white; }
        canvas { position: absolute; top: 0; left: 0; display: block; }

        #ui-header {
            position: absolute; top: 0; width: 100%; padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10; pointer-events: none; box-sizing: border-box;
        }
        .stat-box { font-size: 1.5rem; color: var(--matrix-green); font-weight: bold; text-shadow: 0 0 15px var(--matrix-green); letter-spacing: 2px; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: flex; justify-content: center; align-items: center; z-index: 100;
        }
        .panel {
            background: var(--matrix-panel); border: 2px solid var(--matrix-green);
            padding: 40px; width: 90%; max-width: 750px; box-shadow: 0 0 50px var(--matrix-dark); text-align: center;
        }

        .preview-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            margin: 20px 0; border: 1px solid var(--matrix-dark); padding: 15px; background: rgba(0,0,0,0.6);
        }
        .preview-item { display: flex; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid var(--matrix-dark); }
        .preview-item b { color: #fff; font-size: 1.2rem; text-shadow: 0 0 5px var(--matrix-green); }
        .preview-item span { color: var(--matrix-green); font-size: 1.1rem; font-weight: bold; }

        .diff-row { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .diff-btn {
            background: transparent; border: 2px solid var(--matrix-green); color: var(--matrix-green);
            padding: 10px 25px; cursor: pointer; transition: 0.3s; font-weight: bold; font-size: 1rem;
        }
        .diff-btn.active { background: var(--matrix-green); color: black; box-shadow: 0 0 25px var(--matrix-green); }

        .main-btn { background: var(--matrix-green); color: black; border: none; padding: 18px; font-weight: bold; cursor: pointer; font-size: 1.4rem; width: 100%; letter-spacing: 5px; }

        #input-area { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); z-index: 50; display: none; width: 90%; max-width: 550px;}
        #word-input {
            background: rgba(0,0,0,0.9); border: 3px solid var(--matrix-green); color: #fff;
            font-size: 3rem; text-align: center; padding: 10px; width: 100%; outline: none; border-radius: 4px;
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.3); font-weight: bold; box-sizing: border-box;
        }

        .report-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            max-height: 350px; overflow-y: auto; margin: 25px 0; padding: 15px;
            background: rgba(0,0,0,0.5); border: 1px solid var(--matrix-green);
        }
        .report-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #111; font-size: 1rem; }
        .res-hit { color: var(--matrix-green); font-weight: bold; }
        .res-miss { color: var(--miss-red); font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="matrixCanvas"></canvas>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-header">
        <div class="stat-box">KILLED: <span id="hit-count">0</span></div>
        <div class="stat-box" style="color:#fff; opacity:0.5; font-size:1rem;">MATRIX TARGET // 4-STAR</div>
        <div class="stat-box">MISSED: <span id="miss-count">0</span></div>
    </div>

    <div id="input-area"><input type="text" id="word-input" autocomplete="off" placeholder="输入英文并回车..."></div>

    <div id="start-screen" class="overlay">
        <div class="panel">
            <h1 style="color: var(--matrix-green); margin:0; letter-spacing: 8px; text-shadow: 0 0 20px var(--matrix-green);">拦截任务</h1>
            <div id="preview-grid" class="preview-grid"></div>
            <div class="diff-row">
                <button class="diff-btn" onclick="setDiff(0.4, this)">休闲</button>
                <button class="diff-btn active" onclick="setDiff(0.8, this)">标准</button>
                <button class="diff-btn" onclick="setDiff(2.0, this)">精英</button>
            </div>
            <button class="main-btn" onclick="startGame()">初始化拦截系统</button>
        </div>
    </div>

    <div id="result-screen" class="overlay" style="display: none;">
        <div class="panel">
            <h2 id="final-score-title" style="color: var(--matrix-green); margin:0;">任务结算报告</h2>
            <div id="report-grid" class="report-grid"></div>
            <button class="main-btn" onclick="location.reload()">重新加载</button>
        </div>
    </div>
</div>

r:转移|transport:运输|travel:旅行|treat:对待|treatment:待遇|treaty:条约|tree:树|trial:试验|trip:绊倒|troop:军队|trouble:困难|TRUE:真的|trust:信任|truth:真理|Tuesday:星期二|TV:电视|twelfth:十二|twentieth:二十|type:类型|unit:单位|unless:除非|unlikely:不太可能|upon:上面|urge:推进|use:使用|used:习惯|useful:有用|usual:通常|usually:通常|variety:多样|various:各种|vehicle:车辆|version:版本|victim:牺牲者|victory:胜利|video:录像|village:乡村|violence:猛烈|voice:说话声|volume:容积|voter:选民|warm:温暖|warn:警告|waste:浪费|wave:波涛|weak:弱|weapon:武器|wear:穿戴|weather:天气|Wednesday:星期三|weekend:周末|weight:重量|welcome:欢迎|well:很好|werent:不是|whatever:无论|whats:什么是|while:当时|whom:谁|whos:谁是|wild:野生|will:愿意|willing:心甘情愿|wind:风|window:窗户|wine:葡萄酒|wing:翅膀|winner:获胜者|wish:想要|withdraw:收回|wonder:奇迹|wonderful:惊人|wood:树林|worry:烦恼|worth:值得|wound:创伤|writing:书写|wrong:错误|yard:码|yourself:你自己|youth:青春|tion:识别";
    const allWords = rawData.split('|').map(s=>{const [en,zh]=s.split(':');return {en,zh};});

    const AudioEngine = {
        ctx: null, init() { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        play(f, t, d, v, sweep=false) { 
            if(!this.ctx) return; 
            const o=this.ctx.createOscillator(), g=this.ctx.createGain(); 
            o.type=t; o.frequency.setValueAtTime(f, this.ctx.currentTime); 
            if(sweep) o.frequency.exponentialRampToValueAtTime(10, this.ctx.currentTime+d); 
            g.gain.setValueAtTime(v, this.ctx.currentTime); 
            g.gain.linearRampToValueAtTime(0, this.ctx.currentTime+d); 
            o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime+d); 
        },
        shoot() { this.play(1200, 'sawtooth', 0.05, 0.1); }, 
        hit() { 
            this.play(150, 'sine', 0.4, 0.3, true); 
            this.play(60, 'square', 0.2, 0.2); // 增加爆炸低音
        }, 
        miss() { this.play(80, 'sawtooth', 0.5, 0.2); }
    };

    const mCanvas = document.getElementById('matrixCanvas');
    const mCtx = mCanvas.getContext('2d');
    let drops = [];
    const matrixChars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";

    function initMatrix() {
        mCanvas.width = window.innerWidth; mCanvas.height = window.innerHeight;
        drops = Array(Math.floor(mCanvas.width/20)).fill(1);
    }
    function drawMatrix() {
        mCtx.fillStyle = "rgba(0, 5, 0, 0.15)"; mCtx.fillRect(0, 0, mCanvas.width, mCanvas.height);
        mCtx.fillStyle = "#00FF41"; mCtx.font = "18px monospace";
        drops.forEach((y, i) => {
            const char = matrixChars[Math.floor(Math.random() * matrixChars.length)];
            mCtx.fillText(char, i * 20, y * 20);
            if (y * 20 > mCanvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }

    const gCanvas = document.getElementById('gameCanvas');
    const gCtx = gCanvas.getContext('2d');
    const wordInput = document.getElementById('word-input');
    let gameSpeed = 0.8, currentTask = [], targets = [], lasers = [], particles = [], shake = 0, hits = 0, misses = 0, processed = 0, gameActive = false, finalHistory = [];

    function init() {
        const shuffled = [...allWords].sort(() => 0.5 - Math.random());
        currentTask = shuffled.slice(0, 10);
        document.getElementById('preview-grid').innerHTML = currentTask.map(w => `<div class="preview-item"><span>${w.zh}</span> <b>${w.en}</b></div>`).join('');
        initMatrix(); resize();
    }
    function resize() { gCanvas.width = window.innerWidth; gCanvas.height = window.innerHeight; }
    window.addEventListener('resize', () => { initMatrix(); resize(); });
    function setDiff(s, btn) { gameSpeed = s; document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }

    function createParticles(x, y) {
        for(let i=0; i<15; i++) {
            particles.push({
                x, y, 
                vx: (Math.random()-0.5)*15, 
                vy: (Math.random()-0.5)*15, 
                life: 1.0,
                char: matrixChars[Math.floor(Math.random()*matrixChars.length)]
            });
        }
    }

    function startGame() {
        if(!AudioEngine.ctx) AudioEngine.init();
        if(AudioEngine.ctx.state === 'suspended') AudioEngine.ctx.resume();
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('input-area').style.display = 'block';
        gameActive = true; wordInput.focus();
        hits=0; misses=0; processed=0; targets=[]; lasers=[]; particles=[]; shake=0; finalHistory=[]; updateUI();
        let spawned = 0;
        const interval = setInterval(() => {
            if (spawned < 10 && gameActive) {
                targets.push({ en: currentTask[spawned].en, zh: currentTask[spawned].zh, x: Math.random() * (window.innerWidth - 250) + 125, y: -100, dead: false, angle: 0 });
                spawned++;
            } else { clearInterval(interval); }
        }, 2000);
    }

    wordInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const val = wordInput.value.toLowerCase().trim();
            AudioEngine.shoot();
            const target = targets.find(b => b.en === val && !b.dead);
            if (target) {
                lasers.push({ x: target.x, y: target.y, life: 12 });
                target.dead = true; hits++; processed++; 
                createParticles(target.x, target.y);
                shake = 15; // 命中抖动
                finalHistory.push({ ...target, status: '拦截成功' });
                AudioEngine.hit(); updateUI();
            }
            wordInput.value = '';
        }
    });

    function updateUI() { document.getElementById('hit-count').innerText = hits; document.getElementById('miss-count').innerText = misses; }

    function gameLoop() {
        drawMatrix();
        gCtx.save();
        if(shake > 0) {
            gCtx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
            shake *= 0.9;
        }

        gCtx.clearRect(0, 0, gCanvas.width, gCanvas.height);
        if (gameActive) {
            // 战机
            const cx = gCanvas.width / 2, cy = gCanvas.height - 110;
            gCtx.fillStyle = "#00FF41";
            gCtx.shadowBlur = 15; gCtx.shadowColor = "#00FF41";
            gCtx.beginPath(); gCtx.moveTo(cx, cy); gCtx.lineTo(cx-30, cy+40); gCtx.lineTo(cx+30, cy+40); gCtx.fill();
            gCtx.fillRect(cx-2, cy-20, 4, 30); gCtx.shadowBlur = 0;

            for (let i = targets.length - 1; i >= 0; i--) {
                const b = targets[i];
                if (!b.dead) {
                    b.y += gameSpeed;
                    b.angle += 0.05;
                    
                    // 绘制赛博靶心
                    gCtx.strokeStyle = "#00FF41";
                    gCtx.lineWidth = 2;
                    // 外圈
                    gCtx.beginPath(); gCtx.arc(b.x, b.y, 45, 0, Math.PI*2); gCtx.stroke();
                    // 扫描线
                    gCtx.beginPath(); gCtx.moveTo(b.x - 60, b.y); gCtx.lineTo(b.x + 60, b.y); gCtx.stroke();
                    gCtx.beginPath(); gCtx.moveTo(b.x, b.y - 60); gCtx.lineTo(b.x, b.y + 60); gCtx.stroke();
                    // 旋转准星
                    gCtx.save();
                    gCtx.translate(b.x, b.y);
                    gCtx.rotate(b.angle);
                    for(let a=0; a<4; a++){
                        gCtx.rotate(Math.PI/2);
                        gCtx.beginPath(); gCtx.moveTo(35, 0); gCtx.lineTo(55, 0); gCtx.stroke();
                    }
                    gCtx.restore();

                    // 文字背景板
                    const boxW = 180; const boxH = 50;
                    gCtx.fillStyle = "rgba(0, 255, 65, 0.1)";
                    gCtx.fillRect(b.x - boxW/2, b.y + 65, boxW, boxH);
                    gCtx.strokeStyle = "#00FF41";
                    gCtx.strokeRect(b.x - boxW/2, b.y + 65, boxW, boxH);

                    // 核心中文文字 (特大)
                    gCtx.fillStyle = "#fff";
                    gCtx.font = "bold 32px sans-serif";
                    gCtx.textAlign = "center";
                    gCtx.fillText(b.zh, b.x, b.y + 102);

                    if (b.y > gCanvas.height - 50) {
                        b.dead = true; misses++; processed++; finalHistory.push({ ...b, status: '逃逸' });
                        AudioEngine.miss(); updateUI();
                    }
                } else { targets.splice(i, 1); }
            }

            // 粒子系统绘制
            for(let i=particles.length-1; i>=0; i--){
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                if(p.life <= 0) particles.splice(i, 1);
                else {
                    gCtx.fillStyle = `rgba(0, 255, 65, ${p.life})`;
                    gCtx.font = "16px monospace";
                    gCtx.fillText(p.char, p.x, p.y);
                }
            }

            // 激光
            lasers.forEach((l, i) => {
                gCtx.strokeStyle = "#fff"; gCtx.lineWidth = l.life;
                gCtx.shadowBlur = 20; gCtx.shadowColor = "#fff";
                gCtx.beginPath(); gCtx.moveTo(gCanvas.width/2, gCanvas.height-110); gCtx.lineTo(l.x, l.y); gCtx.stroke();
                l.life -= 2; gCtx.shadowBlur = 0; if(l.life <= 0) lasers.splice(i, 1);
            });
            if (processed === 10 && lasers.length === 0 && particles.length === 0) { gameActive = false; setTimeout(showReport, 800); }
        }
        gCtx.restore();
        requestAnimationFrame(gameLoop);
    }

    function showReport() {
        document.getElementById('input-area').style.display = 'none';
        document.getElementById('result-screen').style.display = 'flex';
        document.getElementById('final-score-title').innerText = `拦截率 ${hits * 10}%`;
        document.getElementById('report-grid').innerHTML = finalHistory.map(m => `
            <div class="report-row">
                <span class="${m.status === '拦截成功' ? 'res-hit' : 'res-miss'}">[${m.status}]</span>
                <b>${m.en}</b><span>${m.zh}</span>
            </div>
        `).join('');
    }
    init(); requestAnimationFrame(gameLoop);
</script>
